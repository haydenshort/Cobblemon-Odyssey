<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cobblemon Odyssey — Cobblemon Changes</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0f13;
  --surface: #16181f;
  --surface2: #1e2029;
  --border: #2a2d3a;
  --text: #e8eaf0;
  --text-muted: #6b7280;
  --text-dim: #9ca3af;
  --add: #22c55e;
  --remove: #ef4444;
  --neutral: #f59e0b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  line-height: 1.6;
  padding: 40px 20px;
}
.page-header {
  max-width: 960px;
  margin: 0 auto 16px;
  border-left: 3px solid var(--neutral);
  padding-left: 20px;
}
.page-header .subtitle { color: var(--text-muted); font-size: 12px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px; }
.page-header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 52px; letter-spacing: 2px; line-height: 1; }
.page-header .version { color: var(--text-muted); font-size: 12px; font-family: 'DM Mono', monospace; margin-top: 6px; }

/* Search */
.search-bar {
  max-width: 960px;
  margin: 0 auto 24px;
}
.search-bar input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 16px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.search-bar input:focus { border-color: #4a4d5a; }
.search-bar input::placeholder { color: var(--text-muted); }

.gen-section { max-width: 960px; margin: 0 auto 12px; }
.gen-header {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 2px;
  color: var(--text-muted);
  text-transform: uppercase;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 10px;
}
.pokemon-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 8px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.pokemon-card:hover { border-color: #3a3d4a; }
.card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 18px;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
}
.card-header:hover { background: var(--surface2); }
.dex-number {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2px 7px;
  letter-spacing: 1px;
  flex-shrink: 0;
  align-self: center;
}
.name-sprite-wrap {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 8px;
  flex: 1;
  min-width: 0;
  align-self: center;
}


.change-badges { display: flex; gap: 5px; flex-wrap: wrap; }
.badge {
  font-size: 10px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase;
  padding: 2px 7px; border-radius: 20px; border: 1px solid;
}
.badge-stats   { color: var(--neutral); border-color: #f59e0b44; background: #f59e0b0d; }
.badge-ability { color: #4ade80; border-color: #4ade8044; background: #4ade800d; }
.badge-type    { color: #f87171; border-color: #f8717144; background: #f871710d; }
.badge-evo     { color: #a78bfa; border-color: #a78bfa44; background: #a78bfa0d; }
.badge-moves   { color: #60a5fa; border-color: #60a5fa44; background: #60a5fa0d; }
.badge-levelup { color: #c084fc; border-color: #c084fc44; background: #c084fc0d; }
.chevron { color: var(--text-muted); font-size: 12px; transition: transform 0.2s; flex-shrink: 0; }
.card-header.active .chevron { transform: rotate(180deg); }
.card-body {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows 0.35s cubic-bezier(0.4,0,0.2,1) 0s;
  border-top: 0px solid var(--border);
}
.card-body.open {
  grid-template-rows: 1fr;
  border-top: 1px solid var(--border);
  transition: grid-template-rows 0.35s cubic-bezier(0.4,0,0.2,1) 0.1s;
}
.card-body-inner { overflow: hidden; }
.section-block { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); }
.section-block:last-child { border-bottom: none; }
.section-label { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
.stat-table { width: 100%; border-collapse: collapse; font-family: 'DM Mono', monospace; font-size: 12px; }
.stat-table th { text-align: left; color: var(--text-muted); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 4px 10px; border-bottom: 1px solid var(--border); }
.stat-table td { padding: 6px 10px; }
.stat-table tr.old td { color: #f87171; }
.stat-table tr.new td { color: #4ade80; }
.stat-table tr.old td:first-child, .stat-table tr.new td:first-child { color: var(--text-muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
.stat-table tr.new td strong { color: #86efac; font-weight: 700; }
.ability-compare { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.ability-col label { display: block; font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.ability-slot { display: flex; align-items: center; gap: 6px; padding: 5px 8px; border-radius: 5px; background: var(--surface2); margin-bottom: 4px; font-size: 12px; border: 1px solid transparent; }
.ability-slot.changed { background: #22c55e10; border-color: #22c55e30; color: #4ade80; }
.ability-slot.removed { background: #ef444410; border-color: #ef444430; color: #f87171; text-decoration: line-through; opacity: 0.8; }
.ability-slot.hidden-ab { color: var(--text-muted); font-style: italic; }
.slot-tag { font-size: 9px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
.type-compare { display: flex; gap: 20px; }
.type-compare label { display: block; font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.type-val { font-family: 'DM Mono', monospace; font-size: 13px; padding: 3px 10px; border-radius: 4px; }
.old-type { color: #f87171; background: #ef444415; border: 1px solid #ef444430; }
.new-type { color: #4ade80; background: #22c55e15; border: 1px solid #22c55e30; }
.evo-note { font-size: 13px; color: #a78bfa; background: #a78bfa10; border: 1px solid #a78bfa30; border-radius: 5px; padding: 6px 12px; display: inline-block; }
.move-notes { list-style: none; display: flex; flex-direction: column; gap: 5px; }
.move-note { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-dim); }
.move-note::before { content: '+'; color: var(--add); font-weight: 700; font-size: 14px; width: 12px; flex-shrink: 0; }
.tm { font-family: 'DM Mono', monospace; color: var(--text-muted); font-size: 11px; background: var(--surface2); padding: 1px 5px; border-radius: 3px; border: 1px solid var(--border); }
.levelup-scroll { max-height: 260px; overflow-y: auto; border-radius: 6px; border: 1px solid var(--border); }
.levelup-scroll::-webkit-scrollbar { width: 4px; }
.levelup-scroll::-webkit-scrollbar-track { background: transparent; }
.levelup-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.levelup-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.levelup-table th { text-align: left; color: var(--text-muted); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 5px 10px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); }
.levelup-table td { padding: 5px 10px; border-bottom: 1px solid #1e202944; color: var(--text-dim); }
.levelup-table td:first-child { font-family: 'DM Mono', monospace; color: var(--text-muted); width: 50px; text-align: center; }
.levelup-table tr:last-child td { border-bottom: none; }
.levelup-table tr:hover td { background: var(--surface2); }
.hidden-card { display: none !important; }




.pokemon-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 1.5px;
  white-space: nowrap;
  line-height: 1;
  align-self: center;
  transition: letter-spacing 0.3s ease;
  margin-top: 4px;
}
.card-header.active .pokemon-name {
  letter-spacing: 3px;
}
.pokemon-sprite { height: 72px; width: 72px; object-fit: contain; image-rendering: pixelated; flex-shrink: 0; transform: translateY(-6px); align-self: center; margin-bottom: -20px; margin-top: -20px; }
@keyframes pokebob { 0%, 49% { transform: translateY(-6px); } 50%, 99% { transform: translateY(-8px); } 100% { transform: translateY(-6px); } }
.pokemon-sprite.bobbing { animation: pokebob 0.35s steps(1) infinite; }
.badge-mega { color: #fb923c; border-color: #fb923c44; background: #fb923c0d; }
.mega-divider {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 20px; background: #fb923c08;
  border-top: 1px solid #fb923c22; border-bottom: 1px solid #fb923c22;
  font-size: 10px; font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase; color: #fb923c;
}
@media (max-width: 600px) {
  .search-wrap { padding: 12px; }
  .search-wrap input { font-size: 14px; padding: 10px 14px; }
  .card-header { padding: 10px 12px; gap: 8px; }
  .dex-number { font-size: 10px; padding: 2px 5px; }
  .pokemon-name { font-size: 20px; }
  .pokemon-sprite { height: 52px; width: 52px; }
  .change-badges { gap: 4px; }
  .badge { font-size: 8px; padding: 2px 6px; }
  .section-block { padding: 14px 12px 12px; }
  .ability-compare { grid-template-columns: 1fr 1fr; gap: 6px; }
  .ability-slot { font-size: 11px; padding: 5px 7px; }
  .stat-table { font-size: 11px; }
  .stat-table th, .stat-table td { padding: 4px 6px; }
  .levelup-table { font-size: 12px; }
  .gen-header { font-size: 11px; padding: 6px 12px; }
  .type-val { font-size: 12px; padding: 3px 10px; }
  .move-notes { padding-left: 0; }
  .move-note { font-size: 12px; }
}

</head>

  const isOpening = !header.classList.contains('active');
  const body = header.nextElementSibling;
  const sprite = header.querySelector('.pokemon-sprite');

  if (isOpening) {
    // Animate name first, then open dropdown after delay
    header.classList.add('active');
    if (sprite) sprite.classList.add('bobbing');
    setTimeout(() => { body.classList.add('open'); }, 100);
  } else {
    // Animate name first, then close dropdown after delay
    header.classList.remove('active');
    if (sprite) sprite.classList.remove('bobbing');
    setTimeout(() => { body.classList.remove('open'); }, 100);
  }
}
function filterCards() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('.pokemon-card').forEach(card => {
    const name = card.querySelector('.pokemon-name').textContent.toLowerCase();
    const num  = card.querySelector('.dex-number').textContent.toLowerCase();
    card.classList.toggle('hidden-card', q && !name.includes(q) && !num.includes(q));
  });
}
</script>
